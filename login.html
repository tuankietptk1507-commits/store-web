<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UniStore Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style-login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
<script src="js/auth.js"></script>
<script src="./js/login.js"></script>
<body>
    <a class="btn-back" href="./index.html"><img src="./img/login/arrow-left-line (1).svg" alt=""></a>
    <div class="block--1"></div>
    <div class="block--2"></div>
    <div class="logo">
        <img src="./img/login/logo.svg" alt="">
    </div>
    <div class="login-card">
        <h2>Login to your account</h2>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="poppie@gmail.com">
        </div>

        <div class="form-group">
            <div class="password-row">
                <label>Password</label>
                <a href="#" class="forgot">Forgot ?</a>
            </div>
            <div class="password-input">
                <input type="password" id="login-password" placeholder="Enter your password">
                <img src="./img/login/eye-close-line (1).svg" class="eye-close" alt="">
                <img src="./img/login/eye-line (1).svg" class="eye-open" alt="">
            </div>
        </div>
        <button class="login-btn" onclick="handleLogin()">Login now</button>
        <div class="signup">
            Don't Have An Account ? <a href="./signup.html">Sign Up</a>
        </div>
    </div>
</body>
<script>
    const passwordInput = document.querySelector('.password-input input');
    const eyeClose = document.querySelector('.eye-close');
    const eyeOpen = document.querySelector('.eye-open');

    eyeClose.addEventListener('click', function () {
        passwordInput.type = 'text';
        eyeClose.style.display = 'none';
        eyeOpen.style.display = 'block';
    });

    eyeOpen.addEventListener('click', function () {
        passwordInput.type = 'password';
        eyeOpen.style.display = 'none';
        eyeClose.style.display = 'block';
    });
</script>

</html>
