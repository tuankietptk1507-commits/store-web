<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../share/css/style-footer.css">
    <link rel="stylesheet" href="../../share/css/style-header.css">
    <link rel="stylesheet" href="style-upload.css">
    <title>Upload</title>
</head>

<body>
    <header></header>
    <section class="upload">
        <div class="upload-container">
            <div class="upload-file">
                <div class="upload-file-tittle">Tải lên APK</div>
                <div class="upload-file-main">
                    <div class="upload-file-main-ico"></div>
                    <div class="upload-file-main-text">Chọn tệp hoặc kéo thả vào đây</div>
                </div>
            </div>
            <div class="upload-detail">
                <div class="upload-detail-top">
                    <form>
                        <label for="nameAPK">Tên APK</label>
                        <input id="nameAPK" type="text" placeholder="Nhập tên APK">
                    </form>
                    <form>
                        <label for="nameUser">Nhà phát hành</label>
                        <input id="nameUser" type="text" placeholder="Nhập tên nhà phát hành">
                    </form>
                </div>
                <div class="upload-detail-bottom">
                    <form>
                        <label for="description">Mô tả APK</label>
                        <textarea id="description" placeholder="Mô tả thông tin của APK"></textarea>
                    </form>
                </div>

            </div>
            <div class="upload-button">
                <button type="button" class="upload-btn-none">Hủy</button>
                <button type="button" class="upload-btn-save">Lưu APK</button>
            </div>
        </div>
    </section>
    <footer></footer>

    <script src="../../share/js/header-search-mobile.js"></script>
    <script src="../../share/js/header.js"></script>
    <script src="../../share/js/footer.js"></script>
</body>

</html>
